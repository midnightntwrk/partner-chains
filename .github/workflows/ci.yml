name: CI

on:
  push:
    branches:
      - v1.8-fixes
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - v1.8-fixes
  workflow_dispatch:

permissions:
  contents: write
  packages: write

env:
  CARGO_TERM_COLOR: always
  RUST_TOOLCHAIN: "1.90.0"
  SCCACHE_GHA_ENABLED: true
  RUSTC_WRAPPER: sccache

jobs:

### Build and test workflow ###############################################################################################################

  build:
    runs-on: ubuntu-latest
    steps:

      - name: Free up disk space
        run: |
          df -h
          sudo rm -rf /opt/hostedtoolcache || true
          sudo rm -rf /usr/share/dotnet || true
          sudo rm -rf /usr/local/lib/android || true
          docker system prune -af || true
          df -h

      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler libssl-dev pkg-config libclang-dev patchelf

      - name: Install Rust
        run: |
          rustup toolchain install ${{ env.RUST_TOOLCHAIN }} --profile minimal \
            --component cargo,clippy,rustfmt,rust-src \
            --target wasm32v1-none
          rustup default ${{ env.RUST_TOOLCHAIN }}

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-registry-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            cargo-registry-${{ runner.os }}-

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: v1
          shared-key: global
          cache-all-crates: true
          cache-targets: true
          cache-bin: true
          cache-on-failure: true

      - name: Formatting
        run: cargo fmt --check

      - name: Build
        run: cargo build --locked --release

      - name: Test
        run: cargo test --workspace --all-features --locked --exclude partner-chains-cardano-offchain --exclude partner-chains-demo-node

      - name: sccache stats
        if: always()
        run: sccache -s || true

      - name: Prepare binary for docker
        run: |
          cp target/release/partner-chains-demo-node .
          patchelf --set-interpreter /lib64/ld-linux-x86-64.so.2 partner-chains-demo-node

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push docker image
        run: |
          IMAGE=ghcr.io/${{ github.repository }}/partner-chains-node
          docker build -f dev/ci/Dockerfile -t ${IMAGE}:${{ github.sha }} .
          docker tag ${IMAGE}:${{ github.sha }} ${IMAGE}:latest
          docker push ${IMAGE}:${{ github.sha }}
          docker push ${IMAGE}:latest

      - name: Upload partner-chains-node artifact
        uses: actions/upload-artifact@v4
        with:
          name: partner-chains-node-artifact
          path: ./partner-chains-demo-node

  local-env:
    needs: build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        markers: [smoke, rpc, reserve, governed_map, delegator_rewards, ariadne, wizards]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy and test against local environment
        uses: ./.github/actions/tests/local-environment-tests
        with:
          tag: CI
          image: ghcr.io/${{ github.repository }}/partner-chains-node:${{ github.sha }}
          sha: ${{ github.sha }}
          markers: ${{ matrix.markers }}
        env:
          TEST_ENVIRONMENT: local

  documentation-tests:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
      - name: Run Documentation Tests
        uses: ./.github/actions/tests/doc-tests

  checks-complete:
    if: ${{ always() }}
    needs: [
      build,
      local-env,
      documentation-tests
    ]
    runs-on: ubuntu-latest
    steps:
      - name: Check if any needed job failed
        run: |
          if [[ "${{ needs.build.result }}" != "success" ||
                "${{ needs.local-env.result }}" != "success" ||
                "${{ needs.documentation-tests.result }}" != "success" ]]; then
            echo "One or more needed jobs failed."
            exit 1
          else
            echo "All needed jobs passed."
          fi
